<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diwali Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="day3.css">
</head>
<body>
    <div class="background_img">
        <div class="background_text">Celebrate Diwali with your family and friends!</div>
    </div>
    <div class="bottom-section">
        <div class="d-flex flex-row justify-content-center">
            <div class="bottom-section_card">
                <img src="https://d2clawv67efefq.cloudfront.net/ccbp-static-website/lamp-img.png" alt="diwali-lamp" class="bottom-section_card_img">
                <h2 class="bottom-section_card_heading">Diwali Lamp</h2>
                <p class="bottom-section_card_price">Rs 379</p>
            </div>
            <div class="bottom-section_card">
                <img src="https://d2clawv67efefq.cloudfront.net/ccbp-static-website/diya-img.png" alt="diwali-diya" class="bottom-section_card_img">
                <h2 class="bottom-section_card_heading">Diwali Diya</h2>
                <p class="bottom-section_card_price">Rs 199</p>
            </div>
        </div>
        <div class="d-flex flex-row justify-content-center">
            <div class="bottom-section_card">
                <img src="https://d2clawv67efefq.cloudfront.net/ccbp-static-website/firework-img.png" alt="diwali-firework" class="bottom-section_card_img">
                <h2 class="bottom-section_card_heading">Diwali Firework</h2>
                <p class="bottom-section_card_price">Rs 299</p>
            </div>
            <div class="bottom-section_card">
                <img src="https://d2clawv67efefq.cloudfront.net/ccbp-static-website/firecracker-img.png" alt="diwali-firecracker" class="bottom-section_card_img">
                <h2 class="bottom-section_card_heading">Diwali Firecracker</h2>
                <p class="bottom-section_card_price">Rs 199</p>
            </div>
        </div>
        <div class="bottom-section_card_button">
            <button class="btn btn-primary">Shop Now</button>
        </div>
    </div>
</body>
</html>
